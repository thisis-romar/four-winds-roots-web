# Decap CMS Configuration — Four Winds Roots Pharmacy
# Stub only — not production-ready. Review all settings before enabling.
# Docs: https://decapcms.org/docs/configuration-options/
#
# TODO: configure git-gateway in Netlify (Identity + Git Gateway) before going live.
# TODO: update repo name/branch to match the production repository.
# TODO: restrict access: add users via Netlify Identity and set invite-only registration.

backend:
  name: git-gateway
  # TODO: change branch to 'main' once the scaffold is merged and the site is live
  branch: feature/astro-scaffold

# TODO: confirm media folder path once final Astro project structure is settled
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Enable editorial workflow (draft → review → publish) — recommended for a single owner
publish_mode: editorial_workflow

site_url: https://fourwindsrootspharmacy.ca
# TODO: confirm final domain with owner

collections:
  # Pages collection — allows owner to edit page content without touching code
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "src/content/pages/home.md"
        # TODO: create this content file when content is ready to edit via CMS
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Hero Headline", name: "heroHeadline", widget: "string" }
          - { label: "Hero Sub-headline", name: "heroSub", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - name: "contact"
        label: "Contact / Hours"
        file: "src/content/pages/contact.md"
        # TODO: create this content file when content is ready to edit via CMS
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - label: "Hours"
            name: "hours"
            widget: "list"
            fields:
              - { label: "Day", name: "day", widget: "string" }
              - { label: "Open", name: "open", widget: "string" }
              - { label: "Close", name: "close", widget: "string" }
              - { label: "Closed", name: "closed", widget: "boolean", default: false }

  # Services collection — one entry per service page
  - name: "services"
    label: "Services"
    folder: "src/content/services"
    create: false  # pages are created in code, not CMS, for now
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  # Holistic Wellness page
  - name: "holistic"
    label: "Holistic Wellness"
    files:
      - name: "holistic-wellness"
        label: "Holistic Wellness Page"
        file: "src/content/pages/holistic-wellness.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

  # Optical Wellness page
  - name: "optical"
    label: "Optical & Wellness"
    files:
      - name: "optical-wellness"
        label: "Optical & Wellness Page"
        file: "src/content/pages/optical-wellness.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
